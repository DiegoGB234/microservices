services:

  postgres:
    image: postgres:15
    container_name: zipcode-postgres

    environment:
      POSTGRES_USER: diego_papu
      POSTGRES_PASSWORD: diego_pap1
      POSTGRES_DB: zipcode_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


volumes:
  postgres_data: